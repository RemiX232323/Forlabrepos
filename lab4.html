    <main class="techno-block">
        <section>
            <h2>> Таблиця_Піфагора_3x10</h2>
            <table class="pythagoras-table">
                <thead>
                    <tr>
                        <th>×</th><th>1</th><th>2</th><th>3</th><th>4</th><th>5</th><th>6</th><th>7</th><th>8</th><th>9</th><th>10</th>

                    <tr><th>1</th><td>1</td><td>2</td><td>3</td><td>4</td><td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td></tr>

                    </tbody>
            </table>
        </section>

        <hr>

                <tr>
                    <td class="element">H</td>

                    <td class="element">Be</td>

                    <td class="element">Ne</td>
                </tr>
                <tr>
                    <td class="element">Na</td>
                    <td class="element">Mg</td>
                    <td colspan="10"></td> <td class="element">Al</td>
                    <td class="element">Si</td>
                    <td class="element">P</td>
                    <td class="element">S</td>
                    <td class="element">Cl</td>
                    <td class="element">Ar</td>
                </tr>
                <tr>
                    <td class="element">K</td>
                    <td class="element">Ca</td>
